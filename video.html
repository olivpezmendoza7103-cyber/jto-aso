<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejemplo de cómo insertar un video</title>
</head>
<body>

    <h2>Video motivador</h2>

    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/Mzp6fjCFHwQ"
        title="YouTube video player"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
    </iframe>

</body>
</html>
